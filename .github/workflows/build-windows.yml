name: build-windows

# karenda の Windows デスクトップアプリ（.exe）を自動ビルドする。
# Windows PC が無くても、windows-latest ランナー上で electron-builder が
# インストーラ(NSIS)とポータブル exe を生成し、アーティファクトとして配布する。

on:
  workflow_dispatch:        # 手動実行（Actions 画面の Run workflow ボタン）
  push:
    branches:
      - claude/stoic-euler-o43jvu
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows installer + portable
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-calendar-windows
          path: |
            desktop/dist/*.exe
          if-no-files-found: error

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
