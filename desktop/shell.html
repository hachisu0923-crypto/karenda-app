<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Calendar</title>
<style>
  /* 寸法は main.js の定数と一致させること */
  :root {
    --screen-w: 390px;  --screen-h: 844px;
    --bezel-side: 14px; --bezel-top: 30px; --bezel-bot: 14px;
    --shadow: 36px;
    --body-w: calc(var(--screen-w) + var(--bezel-side) * 2);   /* 418 */
    --body-h: calc(var(--screen-h) + var(--bezel-top) + var(--bezel-bot)); /* 888 */
    --stage-w: calc(var(--body-w) + var(--shadow) * 2);        /* 490 */
    --stage-h: calc(var(--body-h) + var(--shadow) * 2);        /* 960 */
    --radius-body: 58px;
    --radius-screen: 44px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;       /* 透過ウィンドウ：マージンは透けて見える */
    overflow: hidden;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  /* 画面に収まらないとき main.js から ?scale= で一律縮小（iframe 論理幅は不変） */
  .stage {
    position: absolute; top: 0; left: 0;
    width: var(--stage-w); height: var(--stage-h);
    transform-origin: top left;
  }

  /* 端末ボディ（黒）＋影は透明マージン内に描画 */
  .phone {
    position: absolute;
    top: var(--shadow); left: var(--shadow);
    width: var(--body-w); height: var(--body-h);
    background: #0b0b0d;
    border-radius: var(--radius-body);
    box-shadow:
      0 24px 60px rgba(0, 0, 0, 0.55),
      0 4px 14px rgba(0, 0, 0, 0.4),
      inset 0 0 0 2px rgba(255, 255, 255, 0.06);
  }

  /* 画面（カレンダー本体の iframe を内包）。上ベゼルが厚め */
  .screen {
    position: absolute;
    top: var(--bezel-top); left: var(--bezel-side);
    width: var(--screen-w); height: var(--screen-h);
    border-radius: var(--radius-screen);
    overflow: hidden;
    background: #fff;
  }
  .screen iframe {
    width: 100%; height: 100%;
    border: 0; display: block;
  }

  /* ダイナミックアイランド（上ベゼル内に配置） */
  .island {
    position: absolute;
    top: 9px; left: 50%;
    transform: translateX(-50%);
    width: 112px; height: 30px;
    background: #000;
    border-radius: 16px;
    z-index: 5;
    pointer-events: none;
  }

  /* iPhone 風ステータス時計（ディスプレイ内・右上のステータスバー位置） */
  .status-clock {
    position: absolute;
    top: 12px; right: 18px;
    z-index: 6;
    padding: 2px 9px;
    border-radius: 11px;
    background: rgba(0, 0, 0, 0.32);
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
    color: #fff;
    font: 600 13px/1.4 -apple-system, "SF Pro Text", "Helvetica Neue",
          "Hiragino Kaku Gothic ProN", "Noto Sans JP", Arial, sans-serif;
    letter-spacing: 0.3px;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
  }

  /* ウィンドウ操作ボタン（透明マージン右上に小さく配置） */
  .win-controls {
    position: absolute;
    top: 8px; right: 8px;
    display: flex; gap: 8px;
    z-index: 10;
  }
  .win-btn {
    width: 22px; height: 22px;
    border: none; border-radius: 50%;
    background: rgba(120, 120, 128, 0.32);
    color: #fff; font-size: 13px; line-height: 22px;
    text-align: center; cursor: pointer;
    transition: background 0.12s;
    display: flex; align-items: center; justify-content: center;
  }
  .win-btn:hover { background: rgba(120, 120, 128, 0.6); }
  .win-btn.is-close:hover { background: #e03131; }
  .win-btn.is-pin.is-active { background: #f0a020; color: #fff; }  /* 最前面固定 ON */
  .win-btn svg { width: 11px; height: 11px; display: block; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="phone" id="phone">
      <div class="island"></div>
      <div class="screen">
        <iframe id="appframe" src="/" title="My Calendar"
                allow="clipboard-write; camera; autoplay; encrypted-media"></iframe>
        <div class="status-clock" id="status-clock"></div>
      </div>
    </div>
    <div class="win-controls">
      <button class="win-btn is-pin" id="btn-pin" title="最前面に固定" aria-label="最前面に固定" aria-pressed="false">
        <svg viewBox="0 0 12 12"><path d="M5 1h2v3.6l1.8 1.8V8H3.2V6.4L5 4.6V1z" fill="currentColor"/><line x1="6" y1="8" x2="6" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="win-btn is-min" id="btn-min" title="最小化" aria-label="最小化">
        <svg viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <button class="win-btn is-close" id="btn-close" title="閉じる" aria-label="閉じる">
        <svg viewBox="0 0 12 12"><line x1="3" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="9" y1="3" x2="3" y2="9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <script>
    (function () {
      // デバイス全体をウィンドウサイズにフィットさせる（アスペクト比は main 側で固定済み）。
      // iframe の論理幅は 390 のまま＝スマホ UI を維持したまま拡大縮小する。
      var stage = document.getElementById('stage');
      function fitStage() {
        var baseW = stage.offsetWidth || 490;   // .stage の論理サイズ（CSS の --stage-w/h）
        var baseH = stage.offsetHeight || 960;
        var s = Math.min(window.innerWidth / baseW, window.innerHeight / baseH);
        if (!(s > 0)) s = 1;
        stage.style.transform = 'scale(' + s + ')';
      }
      fitStage();
      window.addEventListener('resize', fitStage);

      // ── iPhone 風ステータス時計（24時間表記・先頭ゼロなし）──
      var clockEl = document.getElementById('status-clock');
      function tickClock() {
        if (!clockEl) return;
        var d = new Date();
        clockEl.textContent = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
      }
      tickClock();
      setInterval(tickClock, 1000);

      // ── ウィンドウ操作ボタン ──
      var ctl = window.electronControls || {};
      var btnMin = document.getElementById('btn-min');
      var btnClose = document.getElementById('btn-close');
      if (btnMin)   btnMin.addEventListener('click', function () { ctl.minimize && ctl.minimize(); });
      if (btnClose) btnClose.addEventListener('click', function () { ctl.close && ctl.close(); });

      // ── 最前面に固定（always-on-top）トグル。状態は localStorage に保存し再起動後も復元 ──
      var btnPin = document.getElementById('btn-pin');
      var pinned = localStorage.getItem('karPinTop') === '1';
      function applyPin() {
        if (btnPin) {
          btnPin.classList.toggle('is-active', pinned);
          btnPin.setAttribute('aria-pressed', pinned ? 'true' : 'false');
        }
        if (ctl.setAlwaysOnTop) ctl.setAlwaysOnTop(pinned);
      }
      applyPin();   // 起動時に保存値を復元・適用
      if (btnPin) btnPin.addEventListener('click', function () {
        pinned = !pinned;
        localStorage.setItem('karPinTop', pinned ? '1' : '0');
        applyPin();
      });

      // ── ベゼルのドラッグでウィンドウ移動（CSS transform 下でも安定する手動実装）──
      var phone = document.getElementById('phone');
      var iframe = document.getElementById('appframe');
      var dragging = false, sx = 0, sy = 0, pending = null, raf = 0;

      function flush() {
        raf = 0;
        if (dragging && pending && ctl.dragMove) ctl.dragMove(pending.dx, pending.dy);
      }

      phone.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        if (e.target.closest('.win-controls')) return;   // ボタンはドラッグ起点にしない
        if (e.target.closest('.screen')) return;          // 画面（iframe）はドラッグしない
        dragging = true; sx = e.screenX; sy = e.screenY;
        iframe.style.pointerEvents = 'none';               // ドラッグ中は iframe にイベントを奪われない
        ctl.dragStart && ctl.dragStart();
        e.preventDefault();
      });
      window.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        pending = { dx: e.screenX - sx, dy: e.screenY - sy };
        if (!raf) raf = requestAnimationFrame(flush);
      });
      window.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        iframe.style.pointerEvents = '';
        ctl.dragEnd && ctl.dragEnd();
      });
    })();
  </script>
</body>
</html>
